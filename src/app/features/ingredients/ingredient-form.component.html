<h2 class="text-xl font-semibold mb-3">{{ isEdit ? 'Editar' : 'Nuevo' }} Ingrediente</h2>
<div class="flex flex-col gap-3">
  <label class="ui-field"><span>Nombre</span><input data-initial-focus class="ui-input" [(ngModel)]="form.name" required /></label>
  <div class="grid grid-cols-2 gap-3">
    <label class="ui-field"><span>Unidad</span><select class="ui-select" [(ngModel)]="form.unit" required>@for (u of units; track u.key) {<option [value]="u.key">{{ u.label }}</option>}</select></label>
    <label class="ui-field"><span>Categoría</span><select class="ui-select" [(ngModel)]="form.category" required>@for (c of categories; track c.key) {<option [value]="c.key">{{ c.label }}</option>}</select></label>
  </div>
  <label class="ui-field"><span>Precio por {{ form.unit || 'unidad' }}</span><input class="ui-input" type="number" [(ngModel)]="form.unitPrice" min="0" required /></label>
  <div class="grid grid-cols-2 gap-3">
    <label class="ui-field"><span>Stock actual</span><input class="ui-input" type="number" [(ngModel)]="form.currentStock" min="0" required /></label>
    <label class="ui-field"><span>Stock mínimo</span><input class="ui-input" type="number" [(ngModel)]="form.minimumStock" min="0" required /></label>
  </div>
</div>
<div class="flex justify-end gap-2 mt-4">
  @if (isEdit) { <button class="ui-btn ui-btn-danger" type="button" (click)="remove()">Eliminar</button> }
  <button class="ui-btn" type="button" (click)="cancel()">Cancelar</button>
  <button class="ui-btn ui-btn-primary" type="button" (click)="save()" [disabled]="!isValid()">{{ isEdit ? 'Guardar' : 'Crear' }}</button>
</div>
