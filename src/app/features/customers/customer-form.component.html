<div class="flex items-center justify-between mb-3">
  <h2 class="text-xl font-semibold">{{ data ? 'Editar' : 'Nuevo' }} Cliente</h2>
</div>

<form [formGroup]="form" class="flex flex-col gap-3">
  <label class="ui-field">
    <span>Nombre</span>
    <input data-initial-focus class="ui-input" formControlName="name" />
  </label>
  <label class="ui-field"><span>Teléfono</span><input class="ui-input" formControlName="phone" type="tel" /></label>
  <label class="ui-field"><span>Dirección</span><input class="ui-input" formControlName="address" /></label>
  <label class="ui-field"><span>Notas</span><textarea class="ui-textarea" formControlName="notes" rows="3"></textarea></label>
</form>

<div class="flex justify-end gap-2 mt-4">
  @if (data) {
    <button class="ui-btn ui-btn-danger" type="button" (click)="remove()">Eliminar</button>
  }
  <button class="ui-btn" type="button" (click)="cancel()">Cancelar</button>
  <button class="ui-btn ui-btn-primary" type="button" [disabled]="form.invalid" (click)="save()">Guardar</button>
</div>
