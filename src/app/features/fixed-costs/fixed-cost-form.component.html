<h2 class="text-xl font-semibold mb-3">{{ isEdit ? 'Editar' : 'Nuevo' }} Costo Fijo</h2>
<div class="flex flex-col gap-3">
  <label class="ui-field"><span>Nombre</span><input data-initial-focus class="ui-input" [(ngModel)]="form.name" required /></label>
  <label class="ui-field"><span>Descripción (opcional)</span><input class="ui-input" [(ngModel)]="form.description" /></label>
  <label class="ui-field"><span>Categoría</span><select class="ui-select" [(ngModel)]="form.category" required>@for (c of categories; track c.key) {<option [value]="c.key">{{ c.label }}</option>}</select></label>
  <div class="grid grid-cols-2 gap-3">
    <label class="ui-field"><span>Monto</span><input class="ui-input" type="number" [(ngModel)]="form.amount" min="0" required /></label>
    <label class="ui-field"><span>Frecuencia</span><select class="ui-select" [(ngModel)]="form.frequency" required>@for (f of frequencies; track f.key) {<option [value]="f.key">{{ f.label }}</option>}</select></label>
  </div>
  <p class="text-xs text-gray-400 -mt-1">Equivale a <strong>{{ monthlyEquivalent() | currency: 'ARS' : 'symbol' : '1.0-0' }}/mes</strong></p>
</div>
<div class="flex justify-end gap-2 mt-4">
  @if (isEdit) { <button class="ui-btn ui-btn-danger" type="button" (click)="remove()">Eliminar</button> }
  <button class="ui-btn" type="button" (click)="cancel()">Cancelar</button>
  <button class="ui-btn ui-btn-primary" type="button" (click)="save()" [disabled]="!isValid()">{{ isEdit ? 'Guardar' : 'Crear' }}</button>
</div>
