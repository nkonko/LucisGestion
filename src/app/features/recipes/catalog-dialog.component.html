<div class="flex items-center justify-between mb-2">
  <h2 class="text-xl font-semibold !mb-0">Catálogo de Precios</h2>
  <div class="flex gap-1">
    <button class="ui-btn" type="button" (click)="share()" aria-label="Compartir">
      <span class="material-icons">share</span>
    </button>
    <button class="ui-btn" type="button" (click)="print()" aria-label="Imprimir">
      <span class="material-icons">print</span>
    </button>
  </div>
</div>

<div id="catalog-content" class="catalog">
  <div class="text-center mb-4">
    <div class="text-3xl">🧁</div>
    <h3 class="text-lg font-bold">Lucis Pastelería</h3>
    <p class="text-xs text-gray-500">Catálogo de productos</p>
  </div>

  @for (recipe of store.recipes(); track recipe.id) {
    <div class="catalog-item">
      <div class="flex justify-between items-center py-2 border-b">
        <div>
          <div class="font-medium">{{ recipe.name }}</div>
          <div class="text-xs text-gray-400">{{ recipe.category }}</div>
        </div>
        <div class="text-lg font-bold text-rose-600">{{ recipe.salePrice | ars }}</div>
      </div>
    </div>
  }
</div>

<div class="flex justify-end mt-4">
  <button class="ui-btn" type="button" (click)="close()">Cerrar</button>
</div>
